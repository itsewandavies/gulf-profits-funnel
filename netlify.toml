[build]
  publish = "."
  
[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Handle redirects and routes
[[redirects]]
  from = "/sales"
  to = "/index.html"
  status = 200
  
[[redirects]]
  from = "/order"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/thank-you.html"
  status = 200

# Handle 404s by redirecting to home
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404